# config_v1.5.yaml version 1.5
# config.yaml — maj_github.py v1.7
# Mise a jour du site GitHub
# Placer ce fichier dans le meme dossier que maj_github_v1.7.py
# IMPORTANT : ce fichier est personnel — ne pas le partager ni le publier

# Dossier contenant les fichiers source editables par l'utilisateur
racine_source     = C:\Users\frabo\Documents\Site Web perso\Site B.F. hébreu 21 mars 2026\Hebreu4.0

# Dossier racine du site local (depot git clone de GitHub)
racine_site_local = C:\SiteGITHUB\Hebreu4.0

# Chemin complet vers lancer.cmd (generateur du site)
lancer_cmd        = C:\SiteGITHUB\Hebreu4.0\prog\lancer.cmd

# URL du depot GitHub (informatif uniquement)
url_github        = https://github.com/boulangerfrancis/Hebreu4.0

# ── Authentification GitHub ────────────────────────────────────
# Token PAT (Personal Access Token) :
#   GitHub > Settings > Developer settings >
#   Personal access tokens > Tokens (classic) > Generate new token
#   Cocher : repo (tout le bloc)
#   Expiration : No expiration
#
# Le token est utilise uniquement au moment du push via GIT_ASKPASS
# Il n'apparait jamais dans les URLs ni dans les logs
# Chaque utilisateur met son propre token dans SON config.yaml

github_token      = 
github_user       = 

# ── Options ───────────────────────────────────────────────────
# Message du commit : "auto" = date+heure automatique
message_commit    = auto

# Branche git cible
branche           = main

# Demander confirmation avant le push GitHub
# true  = afficher une boite de dialogue (defaut)
# false = pousser automatiquement sans demander
confirmation_git  = true

# Filtre fichiers (vide = tout accepter)
filtre            = .*\.docx$,.*\.png$,.*\.html$,.*\.py$

# config_v1.5.yaml version 1.5